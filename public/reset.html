<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/style.css"><title>Reset password</title></head><body><main><div class="panel small"><h1>Reset password</h1><input id="p" type="password" placeholder="Nuova password"><button class="primary" onclick="reset()">Salva</button><div id="m"></div></div></main><script>async function reset(){let token=new URLSearchParams(location.search).get('token');let r=await fetch('/api/password-reset/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:p.value})});m.textContent=r.ok?'Password aggiornata, puoi fare login.':(await r.json()).error}</script></body></html>
